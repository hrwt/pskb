<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>for you</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'poppins', sans-serif;
}

/* background */
body{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(to bottom, #ffffff 0%, #f3f3f3 100%);
  overflow:hidden;
}

/* bendera atas */
.flag-top{
  width:100%;
  height:120px;
  background:linear-gradient(red 50%, white 50%);
  animation:wave 3s ease-in-out infinite;
}

/* bendera bawah */
.flag-bottom{
  width:100%;
  height:120px;
  background:linear-gradient(red 50%, white 50%);
  animation:wave 3s ease-in-out infinite reverse;
}

/* animasi gelombang */
@keyframes wave{
  0%{transform:translateY(0);}
  50%{transform:translateY(8px);}
  100%{transform:translateY(0);}
}

/* container tengah */
.content{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  text-align:center;
}

/* judul atas */
.title{
  font-weight:600;
  margin-bottom:15px;
  font-size:18px;
}

/* card */
.card{
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:20px;
  width:260px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  animation:fadeUp 1s ease;
}

/* animasi masuk */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.card h1{
  font-size:20px;
  margin-bottom:10px;
}

.card p{
  font-size:13px;
  margin-bottom:8px;
  color:#333;
}

/* bendera kecil gerak */
.small-flag{
  margin-top:10px;
  font-size:20px;
  animation:shake 1.5s infinite;
}

@keyframes shake{
  0%{transform:rotate(0deg);}
  25%{transform:rotate(5deg);}
  50%{transform:rotate(0deg);}
  75%{transform:rotate(-5deg);}
  100%{transform:rotate(0deg);}
}

/* ilustrasi atas bawah */
.top-img, .bottom-img{
  width:100%;
  max-width:280px;
  opacity:0.9;
}

.top-wrap{
  position:absolute;
  top:80px;
}

.bottom-wrap{
  position:absolute;
  bottom:80px;
}
</style>
</head>

<body>

<div class="flag-top"></div>

<!-- ilustrasi atas -->
<div class="top-wrap">
  <img src="https://i.ibb.co/3m7J9Yp/paskibra-top.png" class="top-img">
</div>

<!-- tengah -->
<div class="content">
  <div class="title">🇮🇩 paskibra 2025 🇮🇩</div>

  <div class="card">
    <h1>kata kata</h1>
    <p>ini bukan sekadar lolos,</p>
    <p>tapi bukti kalau kamu benar-benar berjuang.</p>

    <p>aku tahu kamu capek, aku tahu kamu usaha,</p>
    <p>dan akhirnya... kamu sampai di sini.</p>

    <br>
    <p>dari aku:</p>
    <p>bangga banget sama kamu,</p>
    <p>jangan pernah ragu sama diri kamu lagi ya</p>

    <div class="small-flag">🇮🇩</div>
  </div>
</div>

<!-- ilustrasi bawah -->
<div class="bottom-wrap">
  <img src="https://i.ibb.co/8Xr0v3g/paskibra-bottom.png" class="bottom-img">
</div>

<div class="flag-bottom"></div>

</body>
</html>
