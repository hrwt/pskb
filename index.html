<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>paskibra moment</title>

<style>
body {
  margin: 0;
  font-family: 'poppins', sans-serif;
  overflow: hidden;
}

/* background bendera animasi */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(red 50%, white 50%);
  animation: wave 5s infinite ease-in-out;
}

@keyframes wave {
  0% {transform: scale(1) translateY(0);}
  50% {transform: scale(1.02) translateY(-10px);}
  100% {transform: scale(1) translateY(0);}
}

/* isi tengah */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
}

.card {
  background: rgba(0,0,0,0.3);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  max-width: 500px;
}

h1 {
  font-size: 40px;
  letter-spacing: 3px;
}

p {
  margin-top: 15px;
  font-size: 16px;
}

/* kiri kanan gambar */
.side {
  position: absolute;
  bottom: 0;
  height: 80%;
  opacity: 0.9;
}

.left {
  left: 20px;
  transform: scaleX(-1);
}

.right {
  right: 20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- gambar kiri kanan -->
<img src="cowok.png" class="side left">
<img src="cewek.png" class="side right">

<div class="container">
  <div class="card">
    <h1>paskibra 2025</h1>
    <p>langkah tegap, hati mantap</p>
    <p>mengabdi untuk merah putih 🇮🇩</p>
    <p style="margin-top:20px; font-size:14px; opacity:0.8;">
      dari aku: bangga banget sama kamu, terus jadi yang terbaik yaa 🤍
    </p>
  </div>
</div>

<!-- musik -->
<audio autoplay loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

</body>
</html>
