<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>paskibra moment</title>
  <style>
    body {
      margin: 0;
      font-family: 'poppins', sans-serif;
      background: linear-gradient(to bottom, red 50%, white 50%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 2px;
    }

    p {
      margin-top: 15px;
      font-size: 16px;
      opacity: 0.9;
    }

    .flag {
      width: 60px;
      height: 40px;
      margin: 20px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .red {
      background: red;
      height: 50%;
    }

    .white {
      background: white;
      height: 50%;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="flag">
      <div class="red"></div>
      <div class="white"></div>
    </div>
    <h1>paskibra 2025</h1>
    <p>langkah tegap, hati mantap</p>
    <p>untuk indonesia 🇮🇩</p>
  </div>

</body>
</html>
