<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>for you</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap');

body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, #8b0000, #ffffff);
  overflow: hidden;
}

/* bendera kecil animasi */
.flag {
  width: 50px;
  height: 30px;
  position: relative;
  animation: swing 2s infinite ease-in-out;
  margin-top: 20px;
}

.flag::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 50%;
  background: red;
  top: 0;
}

.flag::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 50%;
  background: white;
  bottom: 0;
}

@keyframes swing {
  0% {transform: rotate(0deg);}
  50% {transform: rotate(5deg);}
  100% {transform: rotate(0deg);}
}

/* teks tengah */
.card {
  text-align: center;
  color: white;
  padding: 20px;
  max-width: 350px;
  animation: fade 2s ease;
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
}

p {
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  margin-top: 10px;
}

/* glow bawah */
.glow {
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.2);
  filter: blur(100px);
  margin-bottom: 30px;
}
</style>
</head>

<body>

<!-- atas -->
<div class="flag"></div>

<!-- tengah -->
<div class="card">
  <h1>paskibra 2025</h1>

  <p>
    ini bukan sekadar lolos,<br>
    tapi bukti kalau kamu benar-benar berjuang.<br><br>

    aku tahu kamu capek, aku tahu kamu usaha,<br>
    dan akhirnya… kamu sampai di sini 🇮🇩
  </p>

  <p style="margin-top:20px; opacity:0.8;">
    dari aku:<br>
    bangga banget sama kamu,<br>
    jangan pernah ragu sama diri kamu ya 🤍
  </p>
</div>

<!-- bawah -->
<div class="flag"></div>
<div class="glow"></div>

<audio autoplay loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

</body>
</html>
