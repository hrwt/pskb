<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>for you</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap');

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, #8b0000, #ffffff);
  overflow: hidden;
}

/* efek glow */
body::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.2);
  filter: blur(120px);
  top: 20%;
}

/* card tengah */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 40px;
  text-align: center;
  color: white;
  max-width: 400px;
  animation: fade 2s ease;
}

@keyframes fade {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1; transform: translateY(0);}
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  letter-spacing: 2px;
}

p {
  font-family: 'Poppins', sans-serif;
  margin-top: 15px;
  line-height: 1.6;
  font-size: 15px;
}

/* garis elegan */
.line {
  width: 50px;
  height: 2px;
  background: white;
  margin: 15px auto;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="card">
  <h1>paskibra 2025</h1>
  <div class="line"></div>

  <p>
    ini bukan sekadar lolos,<br>
    tapi bukti kalau kamu benar-benar berjuang.<br><br>

    aku tahu kamu capek, aku tahu kamu usaha.<br>
    dan akhirnya… kamu sampai di sini.
  </p>

  <p style="margin-top:25px; opacity:0.8;">
    dari aku:<br>
    bangga banget sama kamu.<br>
    jangan pernah ragu sama diri kamu lagi ya 🤍
  </p>
</div>

<audio autoplay loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

</body>
</html>
